<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover">
    <title>Legal Knowledge Graph Chatbot | Indian Law Assistant</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Merriweather', 'Georgia', system-ui, sans-serif;
            background: #0f0f13;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Main app container - FULL SCREEN */
        .app {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            background: #0f0f13;
        }
        
        /* Header - Claude style minimal */
        .chat-header {
            background: #0f0f13;
            color: #e4e4e7;
            padding: 16px 24px;
            text-align: center;
            border-bottom: 1px solid #2a2a2e;
            flex-shrink: 0;
        }
        
        .chat-header h1 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .chat-header h1::before {
            content: "⚖️";
            font-size: 1.2rem;
        }
        
        .chat-header h1::after {
            content: "⚖️";
            font-size: 1.2rem;
        }
        
        /* Session bar - removed session number display */
        .session-bar {
            padding: 8px 24px;
            background: #0a0a0c;
            border-bottom: 1px solid #1f1f23;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-shrink: 0;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
        }
        
        .action-btn {
            background: transparent;
            color: #7c7c8a;
            border: none;
            padding: 4px 12px;
            font-size: 0.7rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 400;
        }
        
        .action-btn:hover {
            background: #1f1f23;
            color: #e4e4e7;
        }
        
        .action-btn.clear:hover {
            color: #f87171;
        }
        
        .action-btn.new:hover {
            color: #d4af37;
        }
        
        /* Messages container - FLEXIBLE, SCROLLABLE */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            background: #0f0f13;
        }
        
        /* Claude-style message wrapper */
        .messages-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px 24px 0 24px;
        }
        
        /* Custom scrollbar - Claude style thin */
        .messages::-webkit-scrollbar {
            width: 5px;
        }
        
        .messages::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .messages::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 10px;
        }
        
        .messages::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }
        
        /* Message bubbles - Claude style (no bubbles, just text) */
        .message {
            padding: 20px 0;
            border-bottom: 1px solid #1f1f23;
            animation: fadeIn 0.3s ease;
        }
        
        .message:last-child {
            border-bottom: none;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Avatar and message layout */
        .message-row {
            display: flex;
            gap: 16px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        
        .user-avatar {
            background: #1f3a5f;
        }
        
        .bot-avatar {
            background: #1a5f3a;
        }
        
        .message-content {
            flex: 1;
            line-height: 1.6;
            font-size: 0.95rem;
        }
        
        .user-message .message-content {
            color: #e4e4e7;
        }
        
        .bot-message .message-content {
            color: #d4d4d8;
        }
        
        /* Role labels - Claude style */
        .role-label {
            font-size: 0.7rem;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: -0.2px;
        }
        
        .user-role {
            color: #d4af37;
        }
        
        .bot-role {
            color: #7c7c8a;
        }
        
        /* Message text styling */
        .message-text {
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        
        .message-text p {
            margin-bottom: 12px;
        }
        
        .message-text p:last-child {
            margin-bottom: 0;
        }
        
        .message-text code {
            background: #1f1f23;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
            font-family: monospace;
        }
        
        .message-text pre {
            background: #1f1f23;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
        }
        
        /* Metadata styling */
        .message-meta {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.7rem;
        }
        
        .sources {
            color: #6b7280;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .source-tag {
            background: #1f1f23;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.7rem;
        }
        
        .turn-indicator {
            color: #52525b;
            font-family: monospace;
            font-size: 0.65rem;
        }
        
        /* Input area - Claude style fixed at bottom */
        .input-area-wrapper {
            flex-shrink: 0;
            background: #0f0f13;
            border-top: 1px solid #1f1f23;
            padding: 20px 24px 28px 24px;
        }
        
        .input-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }
        
        .input-group {
            display: flex;
            gap: 12px;
            background: #1a1a1e;
            border: 1px solid #2a2a2e;
            border-radius: 16px;
            padding: 8px 12px;
            transition: all 0.2s;
        }
        
        .input-group:focus-within {
            border-color: #d4af37;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.1);
        }
        
        #question {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 8px;
            font-size: 0.95rem;
            outline: none;
            color: #e4e4e7;
            font-family: inherit;
            resize: none;
            min-height: 24px;
            max-height: 150px;
        }
        
        #question::placeholder {
            color: #52525b;
        }
        
        #sendBtn {
            background: transparent;
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #7c7c8a;
            font-weight: 500;
        }
        
        #sendBtn:hover:not(:disabled) {
            background: #2a2a2e;
            color: #d4af37;
        }
        
        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Typing indicator - Claude style */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }
        
        .typing-dot {
            width: 6px;
            height: 6px;
            background: #7c7c8a;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }
        
        /* Welcome message special styling */
        .welcome-message .message-content {
            background: transparent;
        }
        
        .welcome-list {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .welcome-tag {
            background: #1f1f23;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #d4af37;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .messages-wrapper {
                padding: 16px 16px 0 16px;
            }
            
            .message-row {
                gap: 12px;
            }
            
            .avatar {
                width: 28px;
                height: 28px;
                font-size: 1rem;
            }
            
            .input-area-wrapper {
                padding: 16px 16px 24px 16px;
            }
            
            .session-bar {
                padding: 8px 16px;
            }
        }
        
        @media (max-width: 480px) {
            .role-label {
                font-size: 0.65rem;
            }
            
            .message-text {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="chat-header">
        <h1>Legal Knowledge Graph Chatbot</h1>
    </div>
    
    <div class="session-bar">
        <div class="action-buttons">
            <button id="clearHistoryBtn" class="action-btn clear">Clear history</button>
            <button id="newChatBtn" class="action-btn new">New chat</button>
        </div>
    </div>
    
    <div class="messages" id="messages">
        <div class="messages-wrapper" id="messagesWrapper">
            <div class="message bot-message welcome-message">
                <div class="message-row">
                    <div class="avatar bot-avatar">⚖️</div>
                    <div class="message-content">
                        <div class="role-label bot-role">Legal Assistant</div>
                        <div class="message-text">
                            <p>Hello! I'm your AI legal research assistant for Indian law. I can help you with:</p>
                            <div class="welcome-list">
                                <span class="welcome-tag">📜 NDPS Act</span>
                                <span class="welcome-tag">🔍 SOP on Crime Scene</span>
                                <span class="welcome-tag">📋 SOP on Zero FIR</span>
                                <span class="welcome-tag">📖 Investigation Guidelines</span>
                            </div>
                            <p style="margin-top: 16px;">How may I assist with your legal research today?</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="input-area-wrapper">
        <div class="input-container">
            <div class="input-group">
                <textarea id="question" placeholder="Ask me anything about Indian law..." rows="1" autocomplete="off"></textarea>
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    const messagesWrapper = document.getElementById('messagesWrapper');
    const questionInput = document.getElementById('question');
    const sendButton = document.getElementById('sendBtn');
    const messagesContainer = document.getElementById('messages');
    
    // Auto-resize textarea
    function autoResizeTextarea() {
        questionInput.style.height = 'auto';
        questionInput.style.height = Math.min(questionInput.scrollHeight, 150) + 'px';
    }
    
    questionInput.addEventListener('input', autoResizeTextarea);
    
    // Session management
    let sessionId = localStorage.getItem('chat_session_id');
    if (!sessionId) {
        sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('chat_session_id', sessionId);
    }
    
    let conversationTurn = 0;
    
    function addMessage(text, isUser = false, sources = [], confidence = null, detectedLang = null, turn = null) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        messageDiv.style.animation = 'fadeIn 0.3s ease';
        
        const avatar = isUser ? '👤' : '⚖️';
        const avatarClass = isUser ? 'user-avatar' : 'bot-avatar';
        const roleLabel = isUser ? 'You' : 'Legal Assistant';
        const roleClass = isUser ? 'user-role' : 'bot-role';
        
        let metaHtml = '';
        
        if (!isUser && sources && sources.length > 0) {
            const sourceTags = sources.slice(0, 3).map(s => {
                const sourceText = typeof s === 'string' ? s.substring(0, 50) : (s.title || s.path || 'source').substring(0, 50);
                return `<span class="source-tag">📖 ${sourceText}</span>`;
            }).join('');
            metaHtml += `<div class="sources">${sourceTags}</div>`;
        }
        
        // Confidence display removed - not showing anymore
        
        if (!isUser && turn !== null && turn > 0) {
            metaHtml += `<div class="turn-indicator">Turn ${turn}</div>`;
        }
        
        messageDiv.innerHTML = `
            <div class="message-row">
                <div class="avatar ${avatarClass}">${avatar}</div>
                <div class="message-content">
                    <div class="role-label ${roleClass}">${roleLabel}</div>
                    <div class="message-text">${text.replace(/\n/g, '<br>')}</div>
                    ${metaHtml ? `<div class="message-meta">${metaHtml}</div>` : ''}
                </div>
            </div>
        `;
        
        messagesWrapper.appendChild(messageDiv);
        messageDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
    
    // Typing indicator - Claude style
    let typingDiv = null;
    function showTyping() {
        removeTyping();
        typingDiv = document.createElement('div');
        typingDiv.className = 'message bot-message';
        typingDiv.id = 'typing-indicator';
        typingDiv.innerHTML = `
            <div class="message-row">
                <div class="avatar bot-avatar">⚖️</div>
                <div class="message-content">
                    <div class="role-label bot-role">Legal Assistant</div>
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            </div>
        `;
        messagesWrapper.appendChild(typingDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    function removeTyping() {
        if (typingDiv) {
            typingDiv.remove();
            typingDiv = null;
        }
    }
    
    async function newChat() {
        try {
            const response = await fetch('http://localhost:8000/conversation/new', {
                method: 'POST'
            });
            
            if (response.ok) {
                const data = await response.json();
                sessionId = data.session_id;
                localStorage.setItem('chat_session_id', sessionId);
                
                messagesWrapper.innerHTML = `
                    <div class="message bot-message welcome-message">
                        <div class="message-row">
                            <div class="avatar bot-avatar">⚖️</div>
                            <div class="message-content">
                                <div class="role-label bot-role">Legal Assistant</div>
                                <div class="message-text">
                                    <p>✨ <strong>New session started</strong></p>
                                    <p>How can I assist with your legal research today?</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                conversationTurn = 0;
            } else {
                addMessage("Failed to start new session.", false);
            }
        } catch (error) {
            console.error('Error starting new chat:', error);
            addMessage("Network error starting new session.", false);
        }
    }
    
    async function clearHistory() {
        try {
            const response = await fetch(`http://localhost:8000/conversation/${sessionId}`, {
                method: 'DELETE'
            });
            
            if (response.ok) {
                addMessage("Conversation history cleared. I've reset our discussion.", false);
                conversationTurn = 0;
            } else {
                addMessage("Failed to clear history.", false);
            }
        } catch (error) {
            console.error('Error clearing history:', error);
            addMessage("Error clearing history.", false);
        }
    }
    
    async function sendMessage() {
        const question = questionInput.value.trim();
        if (!question) return;
        
        questionInput.disabled = true;
        sendButton.disabled = true;
        
        addMessage(question, true);
        questionInput.value = '';
        autoResizeTextarea();
        
        showTyping();
        
        try {
            const response = await fetch('http://localhost:8000/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: question, 
                    session_id: sessionId,
                    clear_history: false
                })
            });
            
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.detail || `HTTP ${response.status}`);
            }
            
            const data = await response.json();
            removeTyping();
            
            if (data.session_id && data.session_id !== sessionId) {
                sessionId = data.session_id;
                localStorage.setItem('chat_session_id', sessionId);
            }
            
            if (data.conversation_turn !== undefined) {
                conversationTurn = data.conversation_turn;
            }
            
            addMessage(
                data.answer,
                false,
                data.sources || [],
                null,  // confidence - not displayed
                data.detected_language,
                data.conversation_turn
            );
        } catch (error) {
            removeTyping();
            addMessage(`Error: ${error.message}. Please ensure the backend is running on port 8000.`, false);
            console.error('Fetch error:', error);
        } finally {
            questionInput.disabled = false;
            sendButton.disabled = false;
            questionInput.focus();
        }
    }
    
    document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);
    document.getElementById('newChatBtn').addEventListener('click', newChat);
    
    questionInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
